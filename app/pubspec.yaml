name: francios
description: "FranciOS - O Sistema Operacional da Vida. App pessoal com IA para saude, produtividade, financas, habitos e evolucao continua."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.15.5
  firebase_storage: ^11.6.6
  cloud_functions: ^4.6.5

  # Estado / Arquitetura
  provider: ^6.1.2
  go_router: ^13.2.0

  # Utilitarios
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  fl_chart: ^0.66.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
